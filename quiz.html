<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apartment Finder - Swiss Rental Apartments Statistics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="index.html">Swiss Rental Apartments</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="search.html">Search</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="stats.html">Statistics</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="quiz.html">Apartment Finder</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="favorites.html">Favorites</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="compare.html">Compare</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container my-4">
    <h2>Apartment Finder Quiz</h2>
    <p class="lead">Answer a few questions and we'll recommend suitable apartments for you!</p>

    <div id="quiz-container">
      <div id="quiz-intro" class="text-center mb-4">
        <h3>Ready for your dream apartment?</h3>
        <button id="start-quiz" class="btn btn-primary btn-lg">Start Quiz</button>
      </div>

      <div id="quiz-questions" class="d-none">
        <div class="quiz-progress mb-4">
          <div id="progress-fill" class="quiz-progress-fill" style="width: 0%"></div>
        </div>
        <div id="question-container">
          <!-- Questions will be populated by JS -->
        </div>
        <div class="d-flex justify-content-between mt-4">
          <button id="prev-btn" class="btn btn-outline-secondary" disabled>Back</button>
          <button id="next-btn" class="btn btn-primary">Next</button>
        </div>
      </div>

      <div id="quiz-results" class="d-none">
        <h3>Your Recommendations</h3>
        <div id="recommendations">
          <!-- Recommendations will be populated by JS -->
        </div>
        <div class="mt-4">
          <button id="restart-quiz" class="btn btn-outline-primary me-2">Restart Quiz</button>
          <button id="apply-filters" class="btn btn-success">Apply as Search Filters</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/quiz.js"></script>
</body>

</html>
