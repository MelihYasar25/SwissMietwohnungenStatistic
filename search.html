<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suchen - Swiss Mietwohnungen Statistik</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="index.html">Swiss Rental Apartments</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="search.html">Search</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="stats.html">Statistics</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="quiz.html">Apartment Finder</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="favorites.html">Favorites</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="compare.html">Compare</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container my-4">
    <h2>Search Rental Apartments</h2>

    <div class="row">
      <div class="col-lg-3">
        <div class="card">
          <div class="card-header">
            <h5>Filters</h5>
            <button id="reset-filters" class="btn btn-outline-secondary btn-sm">Reset</button>
          </div>
          <div class="card-body">
            <form id="filter-form">
              <div class="mb-3">
                <label for="search-input" class="form-label">Search</label>
                <input type="text" class="form-control" id="search-input" placeholder="Title, city...">
              </div>
              <div class="mb-3">
                <label for="canton-select" class="form-label">Canton</label>
                <select class="form-select" id="canton-select">
                  <option value="">All</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="city-select" class="form-label">City</label>
                <select class="form-select" id="city-select">
                  <option value="">All</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="zip-input" class="form-label">ZIP Code</label>
                <input type="text" class="form-control" id="zip-input">
              </div>
              <div class="row">
                <div class="col-6">
                  <label for="min-price" class="form-label">Min Price</label>
                  <input type="number" class="form-control" id="min-price">
                </div>
                <div class="col-6">
                  <label for="max-price" class="form-label">Max Price</label>
                  <input type="number" class="form-control" id="max-price">
                </div>
              </div>
              <div class="row mt-3">
                <div class="col-6">
                  <label for="min-area" class="form-label">Min Area</label>
                  <input type="number" class="form-control" id="min-area">
                </div>
                <div class="col-6">
                  <label for="max-area" class="form-label">Max Area</label>
                  <input type="number" class="form-control" id="max-area">
                </div>
              </div>
              <div class="mb-3 mt-3">
                <label for="rooms-select" class="form-label">Rooms</label>
                <select class="form-select" id="rooms-select">
                  <option value="">All</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5+">5+</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="property-type-select" class="form-label">Property Type</label>
                <select class="form-select" id="property-type-select">
                  <option value="">All</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="sort-select" class="form-label">Sort by</label>
                <select class="form-select" id="sort-select">
                  <option value="">Default</option>
                  <option value="price_asc">Price ascending</option>
                  <option value="price_desc">Price descending</option>
                  <option value="area_asc">Area ascending</option>
                  <option value="area_desc">Area descending</option>
                  <option value="rooms">Number of rooms</option>
                  <option value="newest">Newest first</option>
                </select>
              </div>
              <div class="mb-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="furnished-check">
                  <label class="form-check-label" for="furnished-check">Furnished</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="balcony-check">
                  <label class="form-check-label" for="balcony-check">Balcony</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="pets-check">
                  <label class="form-check-label" for="pets-check">Pets allowed</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="transport-check">
                  <label class="form-check-label" for="transport-check">Public transport nearby</label>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
      <div class="col-lg-9">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div id="result-count">0 results</div>
          <div>
            <button id="view-toggle" class="btn btn-outline-primary">Card View</button>
          </div>
        </div>
        <div id="results-container">
          <!-- Results will be populated by JS -->
        </div>
        <nav id="pagination-nav" aria-label="Page navigation">
          <!-- Pagination will be populated by JS -->
        </nav>
      </div>
    </div>
  </div>

  <!-- Apartment Details Modal -->
  <div class="modal fade" id="apartmentModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="apartmentModalLabel">Apartment Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="apartment-details">
          <!-- Details will be populated by JS -->
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
