<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suchen - Swiss Mietwohnungen Statistik</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="index.html">Swiss Rental Apartments</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="search.html">Search</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="stats.html">Statistics</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="quiz.html">Apartment Finder</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="favorites.html">Favorites</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="compare.html">Compare</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container my-4">
    <h2>Search Rental Apartments</h2>

    <div class="row">
      <div class="col-lg-3">
        <div class="card">
          <div class="card-header">
            <h5>Filters</h5>
            <button id="reset-filters" class="btn btn-outline-secondary btn-sm">Reset</button>
          </div>
          <div class="card-body">
            <form id="filter-form">
              <div class="mb-3">
                <label for="canton-select" class="form-label">Kanton</label>
                <select class="form-select" id="canton-select">
                  <option value="">Alle</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="rooms-select" class="form-label">Zimmer</label>
                <select class="form-select" id="rooms-select">
                  <option value="">Alle</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="price-select" class="form-label">Mietpreisklasse</label>
                <select class="form-select" id="price-select">
                  <option value="">Alle</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="area-select" class="form-label">Wohnungsfläche</label>
                <select class="form-select" id="area-select">
                  <option value="">Alle</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="year-select" class="form-label">Jahr</label>
                <select class="form-select" id="year-select">
                  <option value="">Alle</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="sort-select" class="form-label">Sortieren nach</label>
                <select class="form-select" id="sort-select">
                  <option value="">Standard</option>
                  <option value="value_desc">Anzahl absteigend</option>
                  <option value="value_asc">Anzahl aufsteigend</option>
                  <option value="canton_asc">Kanton A-Z</option>
                </select>
              </div>
              <button type="button" id="reset-filters" class="btn btn-outline-secondary btn-sm">Zurücksetzen</button>
            </form>
          </div>
        </div>
      </div>
      <div class="col-lg-9">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div id="result-count">0 results</div>
          <div>
            <button id="view-toggle" class="btn btn-outline-primary">Card View</button>
          </div>
        </div>
        <div id="results-container">
          <!-- Results will be populated by JS -->
        </div>
        <nav id="pagination-nav" aria-label="Page navigation">
          <!-- Pagination will be populated by JS -->
        </nav>
      </div>
    </div>
  </div>

  <!-- Apartment Details Modal -->
  <div class="modal fade" id="apartmentModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="apartmentModalLabel">Apartment Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="apartment-details">
          <!-- Details will be populated by JS -->
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/search.js"></script>
</body>

</html>
